spring:
  application:
    name: company-platform

  datasource:
    url: jdbc:mariadb://localhost:3306/company_platform
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

server:
  port: 8080

logging:
  level:
    com.company: DEBUG
    org.hibernate.SQL: DEBUG

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폐기물 순환 추적 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e' },
                        dark: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-gray-50 min-h-screen">

<!-- 사이드바 -->
<aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-dark-900 text-white z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
    <div class="p-6 border-b border-dark-700">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-emerald-600 rounded-xl flex items-center justify-center">
                <i class="fas fa-recycle text-white text-lg"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">폐기물 순환</h1>
                <p class="text-xs text-dark-400">추적 시스템 v1.0</p>
            </div>
        </div>
    </div>
    <nav class="p-4 space-y-1" id="sideNav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
            <i class="fas fa-chart-pie w-5 text-center"></i>
            <span>대시보드</span>
        </a>
        <a href="#list" class="nav-item" data-page="list">
            <i class="fas fa-list w-5 text-center"></i>
            <span>추적 목록</span>
        </a>
        <a href="#create" class="nav-item" data-page="create">
            <i class="fas fa-plus-circle w-5 text-center"></i>
            <span>신규 등록</span>
        </a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-dark-700">
        <div class="flex items-center gap-2 text-xs text-dark-400">
            <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
            <span>시스템 정상 운영중</span>
        </div>
    </div>
</aside>

<!-- 모바일 오버레이 -->
<div id="overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

<!-- 메인 콘텐츠 -->
<main class="lg:ml-64 min-h-screen">
    <!-- 탑바 -->
    <header class="bg-white border-b border-gray-200 px-4 lg:px-8 py-4 flex items-center justify-between sticky top-0 z-20">
        <div class="flex items-center gap-4">
            <button class="lg:hidden text-gray-600 text-xl" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <h2 id="pageTitle" class="text-lg font-semibold text-gray-800">대시보드</h2>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="location.reload()" class="text-gray-400 hover:text-gray-600 transition">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <!-- 페이지 컨텐츠 -->
    <div id="pageContent" class="p-4 lg:p-8">
        <!-- pages.js가 여기에 렌더링 -->
    </div>
</main>

<!-- 모달 -->
<div id="modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div id="modalContent" class="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/pages.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
